name: Continuous Deployment (CD)

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    working-directory: shacl-ts-generator

permissions:
  contents: read
  id-token: write  

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate

  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npx tsc
      # - run: npm test

  publish:
    needs: [audit, test]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/

      - run: npm ci
      - run: npx tsc

      - run: npm publish --access public